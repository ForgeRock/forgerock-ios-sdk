name: Build and Test

on:
  workflow_call:
    secrets:
      CONFIG_E2E_CLOUD: 
        description: 'e2e tests configuration file'
        required: true
      SLACK_WEBHOOK_URL:
        description: 'Slack Notifier Webhook'
        required: true

env:
  WORKSPACE: e2e/FRExample.xcworkspace
  SCHEME: FRTestHost
  CONFIGURATION: Debug
  DESTINATION: platform=iOS Simulator,name=iPhone 16,OS=18.5
  XCODE_VERSION: '16.4'

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      # Clone the repo
      - name: Clone the repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{github.event.pull_request.head.repo.full_name}}
          fetch-depth: 0

      # Setup config file for e2e tests
      - name: Setup config file for e2e tests
        env:
          CONFIG_E2E_CLOUD: ${{ secrets.CONFIG_E2E_CLOUD }}
        run: echo $CONFIG_E2E_CLOUD > FRTestHost/FRTestHost/SharedTestFiles/TestConfig/Config-live-01.json

      # Set target Xcode version. For more details and options see:
      # https://github.com/actions/runner-images/blob/main/images/macos/macos-15-Readme.md
      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_${{ env.XCODE_VERSION }}.app && /usr/bin/xcodebuild -version

      # Cache DerivedData
      - name: Cache DerivedData
        uses: actions/cache@v3
        with:
          path: ${{ env.DERIVED_DATA_PATH }}
          key: ${{ runner.os }}-derived-data-${{ env.XCODE_VERSION }}-${{ hashFiles('**/Podfile.lock', '**/*.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-derived-data-${{ env.XCODE_VERSION }}-

      # Install xcresultparser
      - name: Install xcresultparser
        run: |
          # Download specific version binary to avoid brew update times
          curl -LO https://github.com/a7ex/xcresultparser/releases/download/1.5.2/xcresultparser.zip
          unzip xcresultparser.zip
          chmod +x xcresultparser
          sudo mv xcresultparser /usr/local/bin/

      # Pre-boot the simulator to avoid timeouts during xcodebuild
      - name: Pre-boot Simulator
        run: |
          xcrun simctl bootstatus "iPhone 16" -b || true

      # Run unit tests
      - name: Run tests
        run: |
          set -o pipefail && xcodebuild test \
          -scheme FRTestHost \
          -workspace ${{ env.WORKSPACE }} \
          -configuration ${{ env.CONFIGURATION}} \
          -destination '${{ env.DESTINATION }}' \
          -derivedDataPath ${{ env.DERIVED_DATA_PATH }} \
          TEST_TARGET_SIGNING=YES \
          -enableCodeCoverage YES \
          -resultBundlePath TestResults \
          -disable-concurrent-destination-testing \
          -retry-tests-on-failure \
          -test-iterations 1 | xcbeautify

      # Convert test results to JUnit format
      - name: Convert Test Results to JUnit
        run: xcresultparser -o junit TestResults.xcresult > test-report.xml

      # Publish the test results
      - name: Publish test results
        if: success() || failure()
        uses: dorny/test-reporter@v1
        with:
          name: Unit tests results
          path: './test*.xml'
          list-suites: 'all'
          list-tests: 'all'
          fail-on-error: 'true'
          reporter: java-junit
 
      # Send slack notification with result status
      - uses: 8398a7/action-slack@v3
        with:
          mention: 'stoyan.petrov'
          if_mention: 'failure,cancelled'
          fields: repo,author,eventName,message,job,pullRequest,took
          status: ${{ job.status }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: always()
